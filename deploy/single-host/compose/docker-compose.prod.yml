# RedAmon single-host production overlay
# ----------------------------------------
# Layered on top of the base docker-compose.yml so the public host exposes NOTHING
# off-loopback except what nginx (443/80) proxies. deploy.sh activates it by exporting
#   COMPOSE_FILE=docker-compose.yml:deploy/single-host/compose/docker-compose.prod.yml
# before every redamon.sh call, so redamon.sh's bare `docker compose ...` invocations
# inherit it (redamon.sh is never edited).
#
# The `!override` tag REPLACES the base service's `ports:` list instead of merging it,
# which is how we move 0.0.0.0 publishes onto 127.0.0.1 and close 4444 by default.
#
# Interpolated vars are exported by deploy.sh (computed from ACCESS_MODE):
#   NEXT_PUBLIC_AGENT_WS_URL  wss://<domain>/ws/agent | wss://<ip>/ws/agent | ws://.../ws/agent
#   AGENT_CORS_ORIGINS        https://<domain> | https://<ip> | http://<host>   (never '*')
#   WEBAPP_NODE_ENV           production   (enables the Secure-cookie patch)
#   REDAMON_VERSION           image/version stamp (redamon.sh default when blank)
#
# WARNING (footgun): these loopback re-binds hold ONLY while this overlay is active.
# A hand-run bare `docker compose up -d` reloads the base file and republishes
# 3000/8090/4444 on 0.0.0.0 (and starts the profile-less GVM stack). Never run raw
# `docker compose up` on the host -- always go through redamon.sh (COMPOSE_FILE sticky).

services:
  webapp:
    ports: !override
      - "127.0.0.1:${WEBAPP_PORT:-3000}:3000"        # off 0.0.0.0; nginx 443 upstream
    build:
      args:
        # Same-origin WS so the browser never targets :8090. NEXT_PUBLIC_* is inlined
        # by Next.js at build time; the receiving `ARG NEXT_PUBLIC_AGENT_WS_URL` now
        # lives in the base webapp/Dockerfile (no deploy-time patch), so every build
        # bakes this correctly.
        NEXT_PUBLIC_AGENT_WS_URL: "${NEXT_PUBLIC_AGENT_WS_URL:-}"
        REDAMON_VERSION: "${REDAMON_VERSION:-0.0.0}"
    environment:
      NODE_ENV: "${WEBAPP_NODE_ENV:-production}"      # enables the Secure-cookie patch

  agent:
    ports: !override
      - "127.0.0.1:${AGENT_PORT:-8090}:8080"          # off 0.0.0.0; nginx proxies /ws/* only
    environment:
      AGENT_CORS_ORIGINS: "${AGENT_CORS_ORIGINS:-}"   # never '*'

  kali-sandbox:
    # Re-list ALL kali publishes as loopback. The base file hardcodes 4444 on 0.0.0.0,
    # so the whole list must be overridden to close it. Everything here is loopback;
    # 4444 is opened per-engagement via ufw to REVSHELL_TARGET_CIDRS only (see §11).
    ports: !override
      - "127.0.0.1:${MCP_NETWORK_RECON_PORT:-8000}:8000"
      - "127.0.0.1:${MCP_NUCLEI_PORT:-8002}:8002"
      - "127.0.0.1:${MCP_METASPLOIT_PORT:-8003}:8003"
      - "127.0.0.1:${MCP_NMAP_PORT:-8004}:8004"
      - "127.0.0.1:${MCP_PLAYWRIGHT_PORT:-8005}:8005"
      - "127.0.0.1:8013:8013"
      - "127.0.0.1:8014:8014"
      - "127.0.0.1:4444:4444"                          # loopback by default; ufw-open per engagement
      - "127.0.0.1:4040:4040"
      - "127.0.0.1:8015:8015"
      - "127.0.0.1:8016:8016"
